<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stránka nenalezena – Řemeslné práce Vlasák</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--brown:#5a4530;--brown-dark:#3d2d1d;--cream:#F5EFE4;--ink:#2a2118;--muted:#6b5c4a}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--cream);color:var(--ink);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;line-height:1.6;
  background-image:repeating-linear-gradient(90deg,transparent 0,transparent 80px,rgba(90,69,48,.025) 80px,rgba(90,69,48,.025) 81px);
}
.wrap{text-align:center;max-width:520px}
.code{
  font-family:'Playfair Display',serif;
  font-size:clamp(5rem,15vw,8rem);
  color:var(--brown);line-height:1;font-weight:700;
  letter-spacing:-.02em;margin-bottom:8px;font-style:italic;
}
h1{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,4vw,2rem);color:var(--brown-dark);margin-bottom:16px;font-weight:700}
p{color:var(--muted);margin-bottom:32px;font-size:1.05rem}
.btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:14px 28px;background:var(--brown);color:var(--cream);
  text-decoration:none;border-radius:4px;font-weight:500;font-size:15px;
  transition:all .3s;
}
.btn:hover{background:var(--brown-dark);transform:translateY(-2px)}
.divider{display:flex;align-items:center;justify-content:center;gap:14px;margin:0 auto 24px;color:var(--brown);opacity:.4}
.divider::before,.divider::after{content:"";height:1px;width:60px;background:currentColor}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <div class="divider">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.8l-6.2 4.5 2.4-7.4L2 9.4h7.6z"/></svg>
  </div>
  <h1>Tato stránka neexistuje</h1>
  <p>Možná jste zadali špatnou adresu, nebo jsme stránku přesunuli. Vraťte se prosím zpět na úvod.</p>
  <a href="/" class="btn">
    Zpět na úvod
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </a>
</div>
</body>
</html>
